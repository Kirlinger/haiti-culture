<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#FFF9C4"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8BC34A"/>
      <stop offset="100%" style="stop-color:#33691E"/>
    </linearGradient>
    <linearGradient id="palace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DCC8"/>
      <stop offset="100%" style="stop-color:#C8B898"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Rolling hills background -->
  <ellipse cx="200" cy="280" rx="250" ry="80" fill="#558B2F" opacity="0.5"/>
  <ellipse cx="600" cy="270" rx="250" ry="80" fill="#558B2F" opacity="0.5"/>
  <!-- Sans-Souci Palace -->
  <!-- Main building -->
  <rect x="200" y="180" width="400" height="160" fill="url(#palace)"/>
  <!-- Central pavilion / dome -->
  <rect x="310" y="140" width="180" height="50" fill="#D8C8A0"/>
  <ellipse cx="400" cy="140" rx="90" ry="25" fill="#C8B880"/>
  <!-- Windows - main building -->
  <rect x="220" y="200" width="30" height="45" rx="3" fill="#5a8ab0"/>
  <rect x="265" y="200" width="30" height="45" rx="3" fill="#5a8ab0"/>
  <rect x="310" y="200" width="30" height="45" rx="3" fill="#5a8ab0"/>
  <rect x="440" y="200" width="30" height="45" rx="3" fill="#5a8ab0"/>
  <rect x="485" y="200" width="30" height="45" rx="3" fill="#5a8ab0"/>
  <rect x="530" y="200" width="30" height="45" rx="3" fill="#5a8ab0"/>
  <!-- Central door arch -->
  <rect x="368" y="210" width="64" height="80" rx="32" fill="#4a7a98"/>
  <!-- Columns -->
  <rect x="230" y="180" width="12" height="160" fill="#D0C0A0"/>
  <rect x="270" y="180" width="12" height="160" fill="#D0C0A0"/>
  <rect x="520" y="180" width="12" height="160" fill="#D0C0A0"/>
  <rect x="558" y="180" width="12" height="160" fill="#D0C0A0"/>
  <!-- Staircase -->
  <rect x="330" y="340" width="140" height="15" fill="#C8B880"/>
  <rect x="310" y="355" width="180" height="15" fill="#BCA870"/>
  <rect x="290" y="370" width="220" height="15" fill="#B09860"/>
  <!-- Wings of palace -->
  <rect x="100" y="215" width="110" height="125" fill="#D8C8A0"/>
  <rect x="590" y="215" width="110" height="125" fill="#D8C8A0"/>
  <!-- Ground -->
  <rect x="0" y="385" width="800" height="115" fill="url(#ground)"/>
  <!-- Garden paths -->
  <rect x="380" y="385" width="40" height="115" fill="#a0865a"/>
  <!-- Trees -->
  <line x1="150" y1="385" x2="150" y2="300" stroke="#5d4037" stroke-width="8"/>
  <ellipse cx="150" cy="295" rx="35" ry="30" fill="#2E7D32"/>
  <line x1="650" y1="385" x2="650" y2="300" stroke="#5d4037" stroke-width="8"/>
  <ellipse cx="650" cy="295" rx="35" ry="30" fill="#2E7D32"/>
  <!-- Haitian flag on top -->
  <line x1="400" y1="140" x2="400" y2="105" stroke="#555" stroke-width="2"/>
  <rect x="400" y="105" width="30" height="10" fill="#00209F"/>
  <rect x="400" y="115" width="30" height="10" fill="#D21034"/>
  <!-- Text -->
  <rect x="100" y="420" width="600" height="60" rx="8" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="447" font-family="Georgia, serif" font-size="22" fill="#FFD700" text-anchor="middle" font-weight="bold">Palais Sans-Souci</text>
  <text x="400" y="470" font-family="Georgia, serif" font-size="13" fill="#eeeecc" text-anchor="middle">Milot, Haïti • Patrimoine mondial de l'UNESCO</text>
</svg>

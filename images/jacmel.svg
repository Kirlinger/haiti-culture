<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#64B5F6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="700" cy="80" r="45" fill="#FFCC02" opacity="0.95"/>
  <!-- Hills background -->
  <polygon points="0,250 120,180 250,250" fill="#1a5e1a"/>
  <polygon points="550,250 700,170 800,250" fill="#1a5e1a"/>
  <!-- Colorful Jacmel buildings (known for colorful architecture) -->
  <!-- Street/ground -->
  <rect x="0" y="350" width="800" height="150" fill="#c8a068"/>
  <!-- Building 1 -->
  <rect x="50" y="230" width="90" height="130" fill="#D21034"/>
  <rect x="60" y="245" width="25" height="35" rx="2" fill="#87CEEB"/>
  <rect x="100" y="245" width="25" height="35" rx="2" fill="#87CEEB"/>
  <rect x="75" y="305" width="30" height="55" fill="#8B4513"/>
  <polygon points="50,230 95,190 140,230" fill="#B71C1C"/>
  <!-- Building 2 -->
  <rect x="155" y="210" width="100" height="150" fill="#FFD700"/>
  <rect x="165" y="225" width="30" height="40" rx="2" fill="#87CEEB"/>
  <rect x="210" y="225" width="30" height="40" rx="2" fill="#87CEEB"/>
  <rect x="183" y="300" width="34" height="60" fill="#6D4C41"/>
  <polygon points="155,210 205,165 255,210" fill="#F9A825"/>
  <!-- Building 3 (taller) -->
  <rect x="270" y="185" width="120" height="175" fill="#00209F"/>
  <rect x="283" y="200" width="35" height="45" rx="2" fill="#87CEEB"/>
  <rect x="333" y="200" width="35" height="45" rx="2" fill="#87CEEB"/>
  <rect x="283" y="260" width="35" height="40" rx="2" fill="#87CEEB"/>
  <rect x="333" y="260" width="35" height="40" rx="2" fill="#87CEEB"/>
  <rect x="305" y="315" width="40" height="45" fill="#4E342E"/>
  <polygon points="270,185 330,145 390,185" fill="#1A237E"/>
  <!-- Building 4 -->
  <rect x="405" y="220" width="95" height="140" fill="#FF6B35"/>
  <rect x="415" y="235" width="28" height="38" rx="2" fill="#87CEEB"/>
  <rect x="458" y="235" width="28" height="38" rx="2" fill="#87CEEB"/>
  <rect x="432" y="300" width="32" height="60" fill="#795548"/>
  <polygon points="405,220 452,182 500,220" fill="#E64A19"/>
  <!-- Building 5 -->
  <rect x="515" y="235" width="85" height="125" fill="#4CAF50"/>
  <rect x="525" y="250" width="25" height="35" rx="2" fill="#87CEEB"/>
  <rect x="560" y="250" width="25" height="35" rx="2" fill="#87CEEB"/>
  <rect x="540" y="310" width="30" height="50" fill="#5D4037"/>
  <polygon points="515,235 557,200 600,235" fill="#388E3C"/>
  <!-- Building 6 -->
  <rect x="615" y="240" width="80" height="120" fill="#9C27B0"/>
  <rect x="625" y="255" width="22" height="32" rx="2" fill="#87CEEB"/>
  <rect x="658" y="255" width="22" height="32" rx="2" fill="#87CEEB"/>
  <rect x="637" y="310" width="28" height="50" fill="#4A148C"/>
  <polygon points="615,240 655,208 695,240" fill="#7B1FA2"/>
  <!-- Street details -->
  <line x1="0" y1="355" x2="800" y2="355" stroke="#a08058" stroke-width="3"/>
  <!-- Text -->
  <rect x="100" y="425" width="600" height="60" rx="8" fill="rgba(0,0,0,0.65)"/>
  <text x="400" y="452" font-family="Georgia, serif" font-size="22" fill="#FFD700" text-anchor="middle" font-weight="bold">Jacmel, Haïti</text>
  <text x="400" y="474" font-family="Georgia, serif" font-size="13" fill="#cccccc" text-anchor="middle">Ville coloniale colorée • Centre culturel et artistique</text>
</svg>

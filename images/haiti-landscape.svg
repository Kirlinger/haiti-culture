<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="60%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#80deea"/>
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0288d1"/>
      <stop offset="100%" style="stop-color:#006494"/>
    </linearGradient>
    <linearGradient id="land" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="650" cy="100" r="55" fill="#FFD700" opacity="0.9"/>
  <circle cx="650" cy="100" r="40" fill="#FFEB3B"/>
  <!-- Mountains / hills -->
  <polygon points="0,280 200,140 400,280" fill="url(#land)"/>
  <polygon points="200,280 450,120 680,280" fill="#388e3c"/>
  <polygon points="500,280 700,160 800,280" fill="#2e7d32"/>
  <!-- Palm trees -->
  <line x1="120" y1="280" x2="120" y2="200" stroke="#5d4037" stroke-width="8"/>
  <ellipse cx="120" cy="198" rx="40" ry="18" fill="#1b5e20" transform="rotate(-20,120,198)"/>
  <ellipse cx="120" cy="195" rx="35" ry="15" fill="#2e7d32" transform="rotate(10,120,195)"/>
  <line x1="680" y1="280" x2="680" y2="195" stroke="#5d4037" stroke-width="8"/>
  <ellipse cx="680" cy="193" rx="40" ry="18" fill="#1b5e20" transform="rotate(15,680,193)"/>
  <ellipse cx="680" cy="190" rx="35" ry="15" fill="#2e7d32" transform="rotate(-10,680,190)"/>
  <!-- Sea -->
  <rect x="0" y="280" width="800" height="120" fill="url(#sea)"/>
  <!-- Waves -->
  <path d="M0,295 Q100,285 200,295 Q300,305 400,295 Q500,285 600,295 Q700,305 800,295" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>
  <path d="M0,310 Q100,300 200,310 Q300,320 400,310 Q500,300 600,310 Q700,320 800,310" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
  <!-- Beach -->
  <ellipse cx="400" cy="280" rx="400" ry="20" fill="#f9e4b7"/>
  <!-- Text -->
  <rect x="0" y="400" width="800" height="100" fill="rgba(0,0,0,0.5)"/>
  <text x="400" y="440" font-family="Georgia, serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">Paysage d'Haïti</text>
  <text x="400" y="470" font-family="Georgia, serif" font-size="14" fill="#cccccc" text-anchor="middle">La Perle des Antilles</text>
</svg>

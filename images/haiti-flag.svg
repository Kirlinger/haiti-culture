<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Drapeau national d'Haïti">
  <title>Drapeau de la République d'Haïti</title>
  <!-- Bande bleue (haut) -->
  <rect x="0" y="0" width="900" height="300" fill="#00209F"/>
  <!-- Bande rouge (bas) -->
  <rect x="0" y="300" width="900" height="300" fill="#D21034"/>
  <!-- Panneau central blanc (armoiries) -->
  <rect x="305" y="155" width="290" height="290" rx="5" fill="#f8f8f8"/>
  <!-- Ombre légère du panneau -->
  <rect x="305" y="155" width="290" height="290" rx="5" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>

  <!-- Tronc du palmier -->
  <path d="M450 418 Q448 380 452 345 Q450 315 450 285" stroke="#3E2723" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Feuilles de palme — symétriques -->
  <path d="M450 288 Q424 268 393 260" stroke="#2E7D32" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M450 288 Q476 268 507 260" stroke="#2E7D32" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M450 296 Q430 276 408 270" stroke="#388E3C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M450 296 Q470 276 492 270" stroke="#388E3C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M450 308 Q436 292 420 287" stroke="#43A047" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M450 308 Q464 292 480 287" stroke="#43A047" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M449 318 Q439 306 428 302" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M451 318 Q461 306 472 302" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Socle / montagne au sol -->
  <path d="M345 420 Q395 405 450 402 Q505 405 555 420 Z" fill="#795548"/>

  <!-- Canon gauche -->
  <rect x="336" y="387" width="68" height="15" rx="5" fill="#5D4037" transform="rotate(-13 370 394)"/>
  <ellipse cx="337" cy="388" rx="9" ry="9" fill="#4E342E"/>
  <ellipse cx="401" cy="379" rx="6" ry="6" fill="#3E2723"/>

  <!-- Canon droit -->
  <rect x="496" y="387" width="68" height="15" rx="5" fill="#5D4037" transform="rotate(13 530 394)"/>
  <ellipse cx="563" cy="388" rx="9" ry="9" fill="#4E342E"/>
  <ellipse cx="499" cy="379" rx="6" ry="6" fill="#3E2723"/>

  <!-- Boulets de canon gauche -->
  <circle cx="350" cy="405" r="6" fill="#37474F"/>
  <circle cx="362" cy="405" r="6" fill="#455A64"/>
  <circle cx="374" cy="405" r="6" fill="#37474F"/>

  <!-- Boulets de canon droit -->
  <circle cx="526" cy="405" r="6" fill="#37474F"/>
  <circle cx="538" cy="405" r="6" fill="#455A64"/>
  <circle cx="550" cy="405" r="6" fill="#37474F"/>

  <!-- Petit drapeau gauche -->
  <line x1="330" y1="310" x2="330" y2="372" stroke="#5D4037" stroke-width="4"/>
  <rect x="330" y="310" width="34" height="20" fill="#00209F"/>
  <rect x="330" y="330" width="34" height="10" fill="#D21034"/>

  <!-- Petit drapeau droit -->
  <line x1="570" y1="310" x2="570" y2="372" stroke="#5D4037" stroke-width="4"/>
  <rect x="536" y="310" width="34" height="20" fill="#00209F"/>
  <rect x="536" y="330" width="34" height="10" fill="#D21034"/>

  <!-- Bannière de la devise -->
  <path d="M332 428 Q450 440 568 428 L568 448 Q450 458 332 448 Z" fill="#FDD835"/>
  <path d="M332 428 Q450 440 568 428 L568 448 Q450 458 332 448 Z" fill="none" stroke="#F9A825" stroke-width="1"/>
  <text x="450" y="445" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1A0000" letter-spacing="1">L'UNION FAIT LA FORCE</text>
</svg>

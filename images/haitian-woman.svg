<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2e1a0a"/>
    </linearGradient>
    <linearGradient id="dress" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D21034"/>
      <stop offset="50%" style="stop-color:#00209F"/>
      <stop offset="100%" style="stop-color:#D21034"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Decorative background pattern -->
  <circle cx="100" cy="100" r="60" fill="rgba(210,16,52,0.15)"/>
  <circle cx="700" cy="400" r="80" fill="rgba(0,32,159,0.15)"/>
  <circle cx="700" cy="100" r="50" fill="rgba(255,215,0,0.1)"/>
  <circle cx="100" cy="400" r="60" fill="rgba(210,16,52,0.1)"/>
  <!-- Figure silhouette -->
  <!-- Head -->
  <ellipse cx="400" cy="130" rx="48" ry="55" fill="#3d2b1f"/>
  <!-- Traditional headwrap -->
  <ellipse cx="400" cy="100" rx="52" ry="20" fill="#FFD700"/>
  <rect x="348" y="75" width="104" height="40" rx="20" fill="#FFD700"/>
  <ellipse cx="400" cy="75" rx="50" ry="15" fill="#FFC107"/>
  <!-- Neck -->
  <rect x="380" y="180" width="40" height="30" fill="#3d2b1f"/>
  <!-- Body with traditional dress -->
  <path d="M320,210 Q350,205 400,205 Q450,205 480,210 L510,380 Q400,400 290,380 Z" fill="url(#dress)"/>
  <!-- Dress details -->
  <path d="M350,220 Q400,215 450,220 L440,350 Q400,360 360,350 Z" fill="rgba(255,255,255,0.1)"/>
  <!-- Arms -->
  <path d="M320,210 Q280,240 270,300 Q275,310 285,305 Q295,250 335,225 Z" fill="#3d2b1f"/>
  <path d="M480,210 Q520,240 530,300 Q525,310 515,305 Q505,250 465,225 Z" fill="#3d2b1f"/>
  <!-- Jewelry/necklace -->
  <ellipse cx="400" cy="220" rx="35" ry="8" fill="none" stroke="#FFD700" stroke-width="3"/>
  <circle cx="380" cy="225" r="5" fill="#FFD700"/>
  <circle cx="400" cy="228" r="6" fill="#FFD700"/>
  <circle cx="420" cy="225" r="5" fill="#FFD700"/>
  <!-- Text -->
  <rect x="100" y="420" width="600" height="60" rx="8" fill="rgba(0,0,0,0.7)"/>
  <text x="400" y="447" font-family="Georgia, serif" font-size="22" fill="#FFD700" text-anchor="middle" font-weight="bold">Femme Haïtienne en Tenue Traditionnelle</text>
  <text x="400" y="470" font-family="Georgia, serif" font-size="13" fill="#cccccc" text-anchor="middle">Culture et Identité Haïtienne</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1c3a5e"/>
    </linearGradient>
    <linearGradient id="uniform" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00209F"/>
      <stop offset="100%" style="stop-color:#003080"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Background silhouette figure -->
  <ellipse cx="400" cy="170" rx="70" ry="80" fill="#2a2a3e"/>
  <!-- Uniform/silhouette body -->
  <rect x="330" y="240" width="140" height="160" rx="10" fill="url(#uniform)"/>
  <!-- Head -->
  <ellipse cx="400" cy="150" rx="50" ry="60" fill="#3a2a1a"/>
  <!-- Hat -->
  <rect x="340" y="90" width="120" height="20" rx="5" fill="#1a1a1a"/>
  <rect x="360" y="50" width="80" height="50" rx="5" fill="#1a1a1a"/>
  <!-- Medals -->
  <circle cx="360" cy="270" r="8" fill="#FFD700"/>
  <circle cx="385" cy="280" r="8" fill="#FFD700"/>
  <circle cx="410" cy="270" r="8" fill="#C0C0C0"/>
  <!-- Text -->
  <rect x="100" y="420" width="600" height="60" rx="8" fill="rgba(0,0,0,0.7)"/>
  <text x="400" y="448" font-family="Georgia, serif" font-size="22" fill="#FFD700" text-anchor="middle" font-weight="bold">Toussaint Louverture</text>
  <text x="400" y="470" font-family="Georgia, serif" font-size="14" fill="#aaaaaa" text-anchor="middle">Père de la Révolution Haïtienne • 1743–1803</text>
</svg>

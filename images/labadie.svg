<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="60%" style="stop-color:#29b6f6"/>
      <stop offset="100%" style="stop-color:#80deea"/>
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6"/>
      <stop offset="100%" style="stop-color:#023e8a"/>
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e4b7"/>
      <stop offset="100%" style="stop-color:#e8c975"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="680" cy="90" r="50" fill="#FFD700" opacity="0.95"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="80" rx="70" ry="28" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="160" cy="80" rx="45" ry="22" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="240" cy="78" rx="50" ry="20" fill="rgba(255,255,255,0.7)"/>
  <!-- Distant mountains/hills -->
  <polygon points="0,220 150,140 300,220" fill="#1a6644" opacity="0.6"/>
  <polygon points="500,220 650,150 800,220" fill="#1a5544" opacity="0.6"/>
  <!-- Sea/Ocean -->
  <rect x="0" y="220" width="800" height="180" fill="url(#sea)"/>
  <!-- Waves -->
  <path d="M0,235 Q100,225 200,235 Q300,245 400,235 Q500,225 600,235 Q700,245 800,235" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>
  <path d="M0,255 Q80,245 160,255 Q240,265 320,255 Q400,245 480,255 Q560,265 640,255 Q720,265 800,255" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
  <!-- Beach -->
  <path d="M0,380 Q200,360 400,365 Q600,370 800,360 L800,500 L0,500 Z" fill="url(#sand)"/>
  <!-- Palm trees -->
  <line x1="150" y1="380" x2="165" y2="265" stroke="#5d4037" stroke-width="10"/>
  <ellipse cx="168" cy="262" rx="50" ry="22" fill="#1b5e20" transform="rotate(-10,168,262)"/>
  <ellipse cx="162" cy="258" rx="45" ry="18" fill="#2e7d32" transform="rotate(15,162,258)"/>
  <line x1="630" y1="375" x2="615" y2="260" stroke="#5d4037" stroke-width="10"/>
  <ellipse cx="612" cy="257" rx="50" ry="22" fill="#1b5e20" transform="rotate(10,612,257)"/>
  <ellipse cx="618" cy="253" rx="45" ry="18" fill="#2e7d32" transform="rotate(-15,618,253)"/>
  <!-- Boat on water -->
  <path d="M350,290 Q400,280 450,290 L445,310 Q400,315 355,310 Z" fill="white"/>
  <line x1="400" y1="290" x2="400" y2="260" stroke="#555" stroke-width="2"/>
  <polygon points="400,260 400,285 425,275" fill="#D21034"/>
  <!-- Text -->
  <rect x="100" y="430" width="600" height="55" rx="8" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="457" font-family="Georgia, serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">Labadée, Haïti</text>
  <text x="400" y="477" font-family="Georgia, serif" font-size="13" fill="#cceeFF" text-anchor="middle">Station Balnéaire • Côte Nord d'Haïti</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Colorful Haitian art pattern circles -->
  <circle cx="200" cy="150" r="80" fill="#D21034" opacity="0.85"/>
  <circle cx="400" cy="200" r="100" fill="#00209F" opacity="0.85"/>
  <circle cx="600" cy="150" r="80" fill="#FFD700" opacity="0.85"/>
  <circle cx="300" cy="320" r="70" fill="#FF6B35" opacity="0.85"/>
  <circle cx="500" cy="340" r="90" fill="#00B894" opacity="0.85"/>
  <!-- Decorative lines -->
  <line x1="100" y1="100" x2="700" y2="400" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="700" y1="100" x2="100" y2="400" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Stars pattern -->
  <polygon points="400,60 415,100 455,100 423,123 435,163 400,140 365,163 377,123 345,100 385,100" fill="#FFD700" opacity="0.9"/>
  <!-- Text -->
  <rect x="150" y="400" width="500" height="60" rx="8" fill="rgba(0,0,0,0.6)"/>
  <text x="400" y="440" font-family="Georgia, serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">Art Haïtien</text>
</svg>

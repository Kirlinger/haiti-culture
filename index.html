<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haïti | Mémoire, Culture et Grandeur</title>
  <meta name="author" content="Kirlinger357" />
  <meta name="copyright" content="© 2026 Kirlinger357. Tous droits réservés." />
  <meta name="description" content="Site culturel et historique dédié à Haïti : histoire, culture, vodou, cuisine, société, défis, forces et avenir." />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f8fafc;
      color:#0f172a;
      line-height:1.7;
      -webkit-user-select:none;
      user-select:none;
    }

    a{
      text-decoration:none;
    }

    img{
      max-width:100%;
      display:block;
      pointer-events:none;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      background:linear-gradient(135deg,#00209f,#d21034);
      color:white;
      box-shadow:0 8px 24px rgba(0,0,0,0.16);
    }

    .container{
      max-width:1200px;
      margin:auto;
      padding:0 20px;
    }

    .nav{
      min-height:78px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .logo{
      font-size:28px;
      font-weight:800;
      letter-spacing:1px;
    }

    nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    nav a{
      color:white;
      font-weight:700;
      padding:10px 14px;
      border-radius:12px;
      transition:0.25s;
      font-size:15px;
    }

    nav a:hover{
      background:rgba(255,255,255,0.15);
      color:#ffd166;
    }

    .hero{
      min-height:95vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:white;
      padding:80px 20px;
      background:
        linear-gradient(rgba(0,0,0,0.58), rgba(0,0,0,0.62)),
        linear-gradient(135deg,#001a73,#d21034);
    }

    .hero-content{
      max-width:980px;
    }

    .badge{
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(6px);
      margin-bottom:22px;
      font-weight:700;
      font-size:14px;
    }

    .flag-wrap{
      width:220px;
      margin:0 auto 28px;
      background:white;
      border-radius:18px;
      padding:14px;
      box-shadow:0 12px 28px rgba(0,0,0,0.28);
    }

    .hero h1{
      font-size:58px;
      line-height:1.08;
      margin-bottom:20px;
      text-shadow:0 6px 16px rgba(0,0,0,0.28);
    }

    .hero p{
      font-size:21px;
      max-width:820px;
      margin:0 auto 30px;
    }

    .hero-buttons{
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-block;
      padding:14px 24px;
      border-radius:14px;
      font-weight:800;
      transition:0.25s;
      font-size:15px;
      border:none;
      cursor:pointer;
    }

    .btn-primary{
      background:#ffd166;...
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="nav">
        <div class="logo">Haïti Culture</div>
        <nav>
          <a href="index.html">Accueil</a>
          <a href="histoire.html">Histoire</a>
          <a href="culture.html">Culture</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </div>
  </header>
  <div class="hero">
    <div class="hero-content">
      <h1>Bienvenue sur le site de la culture haïtienne</h1>
      <p>Découvrez notre histoire, notre culture et notre héritage.</p>
      <div class="hero-buttons">
        <button class="btn btn-primary">Explorer</button>
        <button class="btn">En savoir plus</button>
      </div>
    </div>
  </div>
</body>
</html>
